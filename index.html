<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>RIAJ Document Hub</title>
</head>

<body>

<h1>RIAJ Document Hub</h1>

<h3>প্রবেশ করুন</h3>

<input type="password" id="pass" placeholder="পাসওয়ার্ড লিখুন">
<button onclick="login()">ঢুকুন</button>

<p id="msg"></p>


<div id="hub" style="display:none;">

<h3>মানুষের রেকর্ড যোগ করুন</h3>

<input type="text" id="name" placeholder="নাম">

<br><br>

<input type="text" id="mobile" placeholder="মোবাইল নম্বর">

<br><br>

<textarea id="info" placeholder="ডকুমেন্ট / তথ্য লিখুন"></textarea>

<br><br>

<button onclick="saveData()">সংরক্ষণ করুন</button>


<h3>রেকর্ড তালিকা</h3>

<div id="result"></div>

</div>


<script>

function login(){ let records = JSON.parse(localStorage.getItem("records")) || [];

function saveData(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let info = document.getElementById("info").value;

records.push({
name:name,
mobile:mobile,
info:info
});

localStorage.setItem("records", JSON.stringify(records));

showData();

}


function showData(){

let result = "";

records.forEach(function(item){

result += `
<p>
<b>নাম:</b> ${item.name}<br>
<b>মোবাইল:</b> ${item.mobile}<br>
<b>তথ্য:</b> ${item.info}
</p>
<hr>
`;

});

document.getElementById("result").innerHTML = result;

}


window.onload = function(){
showData();
}

let password = document.getElementById("pass").value;

if(password == "1234"){

document.getElementById("hub").style.display="block";
document.getElementById("msg").innerHTML="লগইন সফল";

}else{

document.getElementById("msg").innerHTML="ভুল পাসওয়ার্ড";

}

}




</script>


</body>
</html>
