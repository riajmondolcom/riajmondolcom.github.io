<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RIAJ Document Hub</title>

<style>

body{
margin:0;
padding:20px;
background:#f2f2f2;
font-family:Arial;
}

.box{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h1,h3{
text-align:center;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

textarea{
height:120px;
resize:none;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:5px;
background:#0066ff;
color:white;
cursor:pointer;
}

button:hover{
background:#004dcc;
}

.record{
background:#fafafa;
padding:10px;
border-radius:8px;
margin-bottom:10px;
border-left:5px solid blue;
}

.login{
display:block;
}

.main{
display:none;
}

</style>
</head>

<body>

<div class="box">

<div id="loginBox" class="login">

<h1>RIAJ Document Hub</h1>

<input
type="password"
id="pass"
placeholder="পাসওয়ার্ড লিখুন">

<button onclick="login()">
লগইন
</button>

</div>

<div id="mainBox" class="main">

<h2>নতুন রেকর্ড</h2>

<input
type="text"
id="name"
placeholder="নাম">

<input
type="text"
id="mobile"
placeholder="মোবাইল">

<textarea
id="info"
placeholder="তথ্য লিখুন"></textarea>

<button onclick="saveData()">
সংরক্ষণ করুন
</button>

<hr>

<h3>সার্চ</h3>

<input
type="text"
id="search"
placeholder="নাম বা মোবাইল">

<button onclick="searchData()">
খুঁজুন
</button>

<button onclick="showData()">
সব দেখুন
</button>

<hr>

<div id="result"></div>

</div>

</div>

<script>

let records =
JSON.parse(
localStorage.getItem("records")
) || [];

let editIndex = -1;

function login(){ function saveData(){

let name=document.getElementById("name").value.trim();
let mobile=document.getElementById("mobile").value.trim();
let info=document.getElementById("info").value.trim();

if(name=="" || mobile=="" || info==""){
alert("সব তথ্য পূরণ করুন");
return;
}

if(editIndex==-1){

records.push({
name:name,
mobile:mobile,
info:info
});

}else{

records[editIndex]={
name:name,
mobile:mobile,
info:info
};

editIndex=-1;

}

localStorage.setItem("records",JSON.stringify(records));

document.getElementById("name").value="";
document.getElementById("mobile").value="";
document.getElementById("info").value="";

showData();

}

function showData(){

let result="";

records.forEach(function(item,index){

result+=`

<div class="record">

<b>নাম:</b> ${item.name}<br>
<b>মোবাইল:</b> ${item.mobile}<br>
<b>তথ্য:</b> ${item.info}<br><br>

<button onclick="editData(${index})">এডিট</button>

<button onclick="deleteData(${index})">ডিলিট</button>

</div>

`;

});

document.getElementById("result").innerHTML=result;

}

function searchData(){

let search=document.getElementById("search").value.toLowerCase();

let result="";

records.forEach(function(item,index){

if(
item.name.toLowerCase().includes(search) ||
item.mobile.includes(search)
){

result+=`

<div

let pass =
document.getElementById("pass").value;

if(pass=="1234"){

document.getElementById("loginBox").style.display="none";

document.getElementById("mainBox").style.display="block";

showData();

}else{

alert("ভুল পাসওয়ার্ড");

}

}
